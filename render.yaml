services:
  - type: web
    name: slack-bolt-app
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn app:flask_app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "/opt/render/project/src/.playwright"
